services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: monbuddy
      POSTGRES_USER: monbuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Oliver8!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monbuddy"]
      interval: 5s
      timeout: 5s
      retries: 10

  ez-solver:
    image: ghcr.io/jsemolik/mon-buddy-solver:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8191/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  bot:
    image: ghcr.io/jsemolik/mon-buddy-bot:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ez-solver:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://monbuddy:${POSTGRES_PASSWORD:-Oliver8!}@db:5432/monbuddy
      SOLVER_URL: http://ez-solver:8191
    ports:
      - "${API_PORT:-4040}:4040"

volumes:
  pgdata:
